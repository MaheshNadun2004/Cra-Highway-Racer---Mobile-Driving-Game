<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cra Racer - Small</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #071a18 0%, #0a2a25 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #1a3a32;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 12px;
            margin-bottom: 12px;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 50px;
        }
        .score-card, .best-card {
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
            font-size: 0.85rem;
            font-family: monospace;
        }
        .score-card span, .best-card span {
            font-size: 0.6rem;
            color: #aaffdd;
            margin-right: 4px;
        }
        .reset-btn {
            background: #ffaa44;
            border: none;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.75rem;
            color: #1e3a2f;
            cursor: pointer;
        }
        .button-row {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-top: 8px;
            margin-bottom: 5px;
        }
        .drive-btn {
            flex: 1;
            background: linear-gradient(145deg, #2c5a4e, #1e4238);
            border: 2px solid #ffcc77;
            border-radius: 50px;
            padding: 10px 6px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffefb9;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f2a24;
            font-family: monospace;
        }
        .drive-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f2a24;
        }
        .status-area {
            background: #00000099;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #ffdd99;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="320" height="460"></canvas>

    <div class="score-panel">
        <div class="score-card"><span>🏆</span> <span id="scoreValue">0</span></div>
        <div class="best-card"><span>⭐</span> <span id="bestValue">0</span></div>
        <button class="reset-btn" id="resetBtn">🔄 RESTART</button>
    </div>

    <div class="button-row">
        <div class="drive-btn" id="leftBtn">◀ LEFT</div>
        <div class="drive-btn" id="rightBtn">RIGHT ▶</div>
    </div>
    
    <div class="status-area" id="gameStatusText">
        🚗 Tap LEFT/RIGHT | Avoid red cars
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // SMALLER CAR SIZE
        const LANES = 3;
        const LANE_WIDTH = canvas.width / LANES;
        const CAR_WIDTH = 36;
        const CAR_HEIGHT = 54;

        let player = {
            lane: 1,
            x: 0,
            y: canvas.height - 72,
            width: CAR_WIDTH,
            height: CAR_HEIGHT
        };

        let enemies = [];
        let gameRunning = true;
        let score = 0;
        let bestScore = 0;
        let spawnTimer = 0;
        let baseSpeed = 3.2;
        
        try {
            let saved = localStorage.getItem('mobileCraBestSmall');
            if(saved) {
                bestScore = parseInt(saved);
                document.getElementById('bestValue').innerText = bestScore;
            }
        } catch(e) {}

        function updateCarX() {
            let laneCenter = player.lane * LANE_WIDTH + LANE_WIDTH/2;
            player.x = laneCenter - CAR_WIDTH/2;
            player.x = Math.min(Math.max(player.x, 4), canvas.width - CAR_WIDTH - 4);
        }

        function moveLeft() {
            if(!gameRunning) return;
            if(player.lane > 0) {
                player.lane--;
                updateCarX();
            }
        }

        function moveRight() {
            if(!gameRunning) return;
            if(player.lane < LANES - 1) {
                player.lane++;
                updateCarX();
            }
        }

        function spawnEnemy() {
            let laneIndex = Math.floor(Math.random() * LANES);
            let laneCenter = laneIndex * LANE_WIDTH + LANE_WIDTH/2;
            let carX = laneCenter - CAR_WIDTH/2;
            carX = Math.min(Math.max(carX, 4), canvas.width - CAR_WIDTH - 4);
            enemies.push({
                x: carX,
                y: -CAR_HEIGHT,
                width: CAR_WIDTH,
                height: CAR_HEIGHT,
                lane: laneIndex
            });
        }

        function updateGame() {
            if(!gameRunning) return;
            let extraSpeed = Math.min(1.8, Math.floor(score / 500) * 0.35);
            let currentSpeed = baseSpeed + extraSpeed;

            for(let i=0; i<enemies.length; i++) {
                enemies[i].y += currentSpeed;
            }

            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                if(player.x < e.x+e.width && player.x+player.width > e.x &&
                   player.y < e.y+e.height && player.y+player.height > e.y) {
                    gameRunning = false;
                    document.getElementById('gameStatusText').innerHTML = "💥 CRASH! Press RESTART";
                    return;
                }
            }

            let passedCount = 0;
            for(let i=0; i<enemies.length; i++) {
                if(enemies[i].y > canvas.height + 100) {
                    enemies.splice(i,1);
                    i--;
                    passedCount++;
                }
            }
            if(passedCount > 0) {
                score += passedCount * 12;
                updateUI();
            }

            let spawnDelay = Math.max(28, 42 - Math.floor(score/300));
            if(spawnTimer <= 0) {
                spawnEnemy();
                spawnTimer = spawnDelay;
                if(Math.random() < 0.15 && score > 200) spawnEnemy();
            } else {
                spawnTimer--;
            }

            score += 0.2;
            updateUI();
        }

        function updateUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
            if(Math.floor(score) > bestScore) {
                bestScore = Math.floor(score);
                document.getElementById('bestValue').innerText = bestScore;
                localStorage.setItem('mobileCraBestSmall', bestScore);
            }
        }

        function drawRoad() {
            ctx.fillStyle = "#1d352f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = "#FFE2A4";
            ctx.lineWidth = 3;
            ctx.setLineDash([15, 28]);
            for(let i=1; i<LANES; i++) {
                let lineX = i * LANE_WIDTH;
                ctx.beginPath();
                ctx.moveTo(lineX, 0);
                ctx.lineTo(lineX, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.strokeStyle = "#f5bc70";
            ctx.lineWidth = 2;
            ctx.strokeRect(8, 0, canvas.width-16, canvas.height);
        }

        function drawPlayer() {
            ctx.fillStyle = "#2dd4bf";
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, CAR_WIDTH, CAR_HEIGHT, 10);
            ctx.fill();
            ctx.fillStyle = "#1e5a6f";
            ctx.fillRect(player.x+6, player.y+10, CAR_WIDTH-12, 18);
            ctx.fillStyle = "#aaf0ff";
            ctx.fillRect(player.x+9, player.y+14, 6, 9);
            ctx.fillRect(player.x+CAR_WIDTH-15, player.y+14, 6, 9);
            ctx.fillStyle = "#FFD966";
            ctx.beginPath();
            ctx.arc(player.x+6, player.y+CAR_HEIGHT-8, 5, 0, Math.PI*2);
            ctx.arc(player.x+CAR_WIDTH-6, player.y+CAR_HEIGHT-8, 5, 0, Math.PI*2);
            ctx.fill();
        }

        function drawEnemy(e) {
            ctx.fillStyle = "#cf4a4a";
            ctx.beginPath();
            ctx.roundRect(e.x, e.y, CAR_WIDTH, CAR_HEIGHT, 10);
            ctx.fill();
            ctx.fillStyle = "#661111";
            ctx.fillRect(e.x+6, e.y+10, CAR_WIDTH-12, 16);
            ctx.fillStyle = "#ff7777";
            ctx.fillRect(e.x+8, e.y+36, 6, 12);
            ctx.fillRect(e.x+CAR_WIDTH-14, e.y+36, 6, 12);
        }

        function drawGameOverlay() {
            if(!gameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillStyle = "#ffbb77";
                ctx.fillText("GAME OVER", canvas.width/2-65, canvas.height/2-20);
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2*r) r = w/2;
                if (h < 2*r) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        function resetGame() {
            gameRunning = true;
            score = 0;
            enemies = [];
            spawnTimer = 5;
            player.lane = 1;
            updateCarX();
            document.getElementById('gameStatusText').innerHTML = "🚗 Tap LEFT/RIGHT | Avoid red cars";
            updateUI();
        }

        function animate() {
            updateGame();
            drawRoad();
            for(let e of enemies) drawEnemy(e);
            drawPlayer();
            drawGameOverlay();
            requestAnimationFrame(animate);
        }

        document.getElementById('leftBtn').addEventListener('click', () => moveLeft());
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('rightBtn').addEventListener('click', () => moveRight());
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        
        updateCarX();
        resetGame();
        animate();
    })();
</script>
</body>
</html>
